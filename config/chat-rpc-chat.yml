rpc:
  # The IP address where this RPC service registers itself; if left blank, it defaults to the internal network IP
  registerIP: ''
  # IP address that the RPC service listens on; setting to 0.0.0.0 listens on both internal and external IPs. If left blank, it automatically uses the internal network IP
  listenIP: 0.0.0.0
  # List of ports that the RPC service listens on; configuring multiple ports will launch multiple instances.
  ports: [ 30300 ]

verifyCode:
  validTime: 300
  validCount: 5
  uintTime: 86400
  maxCount: 10
  superCode: "666666"
  len: 6
  phone:
    use: "superCode"  # superCode: user superCode; ali: use ali verify code;
    ali:
      endpoint: ""
      accessKeyId: ""
      accessKeySecret: ""
      signName: ""
      verificationCodeTemplateCode: ""
  mail:
    use: "superCode"  # superCode: user superCode; mail: use mail verify code;
    title: ""
    senderMail: ""
    senderAuthorizationCode: ""
    smtpAddr: ""
    smtpPort:

liveKit:
  # 与 openim-api 的 objectAccessBaseURL、MinIO externalAddress 使用同一可达主机（WSL IP 会变时执行 hostname -I 后同步修改）。
  url: "ws://172.24.177.85:7880" # LIVEKIT_URL，需与 Docker LiveKit 映射端口一致
  # key: "APIGPW3gnFTzqHH"
  # secret: "23ztfSqsfQ8hKkHzHTl3Z4bvaxro0snjk5jwbp5p6Q3"
  # 须与 LiveKit 进程一致：openim-stack.sh 使用官方镜像 `livekit-server --dev`，日志中为 API Key=devkey、API Secret=secret。若改用自定义 livekit.yaml，请同步改 key/secret。
  key: "devkey"
  secret: "secret"

allowRegister: true
